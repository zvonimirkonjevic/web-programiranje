<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDb - Images Gallery</title>
    <meta name="description" content="Browse stunning movie-related images in the IMDb image gallery.">
    <meta name="keywords" content="movies, IMDb, images, gallery, cinema, posters">
    <meta name="author" content="Zvonimir Konjevic">
    <meta name="robots" content="index, follow">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="IMDb - Images Gallery">
    <meta property="og:description" content="Browse stunning movie-related images in the IMDb image gallery.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/style_slike.css">
</head>

<body class="page-transition">
    <nav>
        <a href="index.html" class="logo">IMDb</a>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul>
            <li><a href="index.html">Movie list</a></li>
            <li><a href="slike.html" class="active">Images page</a></li>
            <li><a href="grafikon.html">Statistics page</a></li>
        </ul>
    </nav>
    <h1>Image Gallery</h1>

    <div class="gallery-grid"></div>

    <!-- Lightbox overlays injected by gallery.js -->

    <script>
        async function loadGallery() {
            const COUNT = 9;
            const page = Math.floor(Math.random() * 20) + 1;
            const response = await fetch(`https://picsum.photos/v2/list?limit=${COUNT}&page=${page}`);
            const images = await response.json();

            const grid = document.querySelector('.gallery-grid');
            const footer = document.querySelector('footer');

            images.forEach((image, index) => {
                const id = index + 1;
                const thumbUrl = `https://picsum.photos/id/${image.id}/600/400`;
                const fullUrl = `https://picsum.photos/id/${image.id}/1200/800`;
                const caption = image.author;

                grid.insertAdjacentHTML('beforeend', `
                    <a href="#img${id}" class="gallery-item">
                        <img src="${thumbUrl}" alt="${caption}">
                        <div class="gallery-caption">${caption}</div>
                    </a>
                `);

                footer.insertAdjacentHTML('beforebegin', `
                    <div id="img${id}" class="lightbox">
                        <a href="#" class="lightbox-close">&times;</a>
                        <img src="${fullUrl}" alt="${caption}">
                    </div>
                `);
            });
        }

        loadGallery();
    </script>

    <footer>
        <p>Copyright &copy; 2026 IMDb. All rights reserved.</p>
        <p>Created by: Zvonimir Konjevic</p>
    </footer>
</body>

</html>
