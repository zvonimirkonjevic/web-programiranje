<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin panel — IMDb</title>
    <link rel="stylesheet" href="style/style.css">
    <style>
        h1 { margin-bottom: 8px; }
        .page-subtitle {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 32px;
            text-align: center;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .alert-error   { background: rgba(224,82,82,0.15); border: 1px solid #e05252; color: #e05252; }
        .alert-success { background: rgba(76,175,80,0.15);  border: 1px solid #4caf50; color: #4caf50; }
        .table-wrapper {
            max-width: 900px;
            margin: 0 auto;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--imdb-dark-gray);
            border-radius: 10px;
            overflow: hidden;
            font-size: 0.9rem;
        }
        thead { background: #1a1a1a; }
        th {
            padding: 14px 16px;
            text-align: left;
            color: var(--text-gray);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        td {
            padding: 14px 16px;
            border-top: 1px solid var(--border-gray);
            vertical-align: middle;
        }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .role-badge.user  { background: rgba(87,153,239,0.2); color: var(--imdb-blue); }
        .role-badge.admin { background: rgba(245,197,24,0.2);  color: var(--imdb-gold); }
        .btn-action {
            border: none;
            border-radius: 5px;
            padding: 6px 12px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-right: 6px;
        }
        .btn-action:hover   { opacity: 0.8; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-promote  { background: rgba(245,197,24,0.15); color: var(--imdb-gold); border: 1px solid var(--imdb-gold); }
        .btn-demote   { background: rgba(87,153,239,0.15); color: var(--imdb-blue);  border: 1px solid var(--imdb-blue); }
        .btn-delete   { background: rgba(224,82,82,0.15);  color: #e05252;           border: 1px solid #e05252; }
        .loading { text-align: center; color: var(--text-gray); margin: 60px auto; }
        .btn-back {
            display: inline-block;
            max-width: 900px;
            margin: 0 auto 24px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.88rem;
        }
        .btn-back:hover { color: var(--text-white); }
        .back-wrapper { max-width: 900px; margin: 0 auto 20px; }
        footer {
            text-align: center;
            color: var(--text-gray);
            font-size: 0.8rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="logo">IMDb</a>
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburger">
        <span></span><span></span><span></span>
    </label>
    <ul>
        <li><a href="index.html">Movie list</a></li>
        <li><a href="/slike">Images page</a></li>
        <li><a href="grafikon.html">Statistics page</a></li>
        <li><a href="dashboard.html">My account</a></li>
        <li><a href="admin.html" class="active">Admin</a></li>
        <li><a href="movies.html">Manage movies</a></li>
    </ul>
</nav>

<p class="loading" id="loading">Verifying access…</p>

<div id="admin-content" style="display:none;">
    <h1>Admin panel</h1>
    <p class="page-subtitle">Manage registered users.</p>

    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <div class="back-wrapper">
        <a href="dashboard.html" class="btn-back">← Back to my account</a>
    </div>

    <div class="table-wrapper">
        <table id="users-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Registered</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="users-tbody"></tbody>
        </table>
    </div>
</div>

<footer><p>Copyright &copy; 2026 IMDb. All rights reserved.</p></footer>

<script>
    const PHP_API = 'http://localhost:8080';
    let currentAdminId = null;

    function showAlert(type, msg) {
        const el = document.getElementById(`alert-${type}`);
        el.textContent    = msg;
        el.style.display  = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3500);
    }

    function formatDate(iso) {
        return new Date(iso).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function buildRow(user) {
        const isCurrentAdmin = user.id === currentAdminId;
        const tr = document.createElement('tr');
        tr.id = `row-${user.id}`;

        const roleBadge = `<span class="role-badge ${user.role}">${user.role}</span>`;
        const toggleBtn = user.role === 'admin'
            ? `<button class="btn-action btn-demote"  onclick="changeRole(${user.id},'user')"  ${isCurrentAdmin ? 'disabled title="Cannot demote yourself"' : ''}>Demote</button>`
            : `<button class="btn-action btn-promote" onclick="changeRole(${user.id},'admin')">Promote</button>`;
        const deleteBtn = isCurrentAdmin
            ? ''
            : `<button class="btn-action btn-delete" onclick="removeUser(${user.id}, '${user.username.replace(/'/g, "\\'")}')">Delete</button>`;

        tr.innerHTML = `
            <td>${user.id}</td>
            <td>${user.username}</td>
            <td>${user.email}</td>
            <td id="role-${user.id}">${roleBadge}</td>
            <td>${formatDate(user.created_at)}</td>
            <td>${toggleBtn}${deleteBtn}</td>
        `;
        return tr;
    }

    async function loadUsers() {
        const res = await fetch(`${PHP_API}/api/users.php`, { credentials: 'include' });
        const data = await res.json();
        const tbody = document.getElementById('users-tbody');
        tbody.innerHTML = '';
        data.users.forEach(u => tbody.appendChild(buildRow(u)));
    }

    async function changeRole(userId, newRole) {
        const res = await fetch(`${PHP_API}/api/users.php`, {
            method: 'PATCH',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId, role: newRole }),
        });
        const data = await res.json();
        if (!res.ok) { showAlert('error', data.error); return; }
        showAlert('success', data.message);
        await loadUsers();
    }

    async function removeUser(userId, username) {
        if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
        const res = await fetch(`${PHP_API}/api/users.php`, {
            method: 'DELETE',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: userId }),
        });
        const data = await res.json();
        if (!res.ok) { showAlert('error', data.error); return; }
        showAlert('success', data.message);
        document.getElementById(`row-${userId}`)?.remove();
    }

    async function init() {
        try {
            const authRes = await fetch(`${PHP_API}/api/check_auth.php`, { credentials: 'include' });
            if (!authRes.ok) { window.location.href = 'login.html'; return; }

            const { user } = await authRes.json();
            if (user.role !== 'admin') { window.location.href = 'dashboard.html'; return; }

            currentAdminId = user.id;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';

            await loadUsers();
        } catch (_) {
            window.location.href = 'login.html';
        }
    }

    init();
</script>
</body>
</html>
