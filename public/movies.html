<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Movies — IMDb</title>
    <link rel="stylesheet" href="style/style.css">
    <style>
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            margin: 0 auto 24px;
        }
        .page-header h1 { margin: 0; font-size: 1.8rem; }
        .btn-primary {
            background: var(--imdb-gold);
            color: var(--imdb-black);
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #fbd54e; }

        /* Modal */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: var(--imdb-dark-gray);
            border: 1px solid var(--border-gray);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 { font-size: 1.3rem; margin-bottom: 22px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border-gray);
            border-radius: 6px;
            color: var(--text-white);
            padding: 9px 12px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { border-color: var(--imdb-gold); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .field-error {
            color: #e05252;
            font-size: 0.78rem;
            margin-top: 4px;
            display: none;
        }
        .form-group.has-error input,
        .form-group.has-error select,
        .form-group.has-error textarea { border-color: #e05252; }
        .form-group.has-error .field-error { display: block; }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn-cancel {
            flex: 1;
            background: transparent;
            color: var(--text-gray);
            border: 1px solid var(--border-gray);
            border-radius: 6px;
            padding: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-cancel:hover { border-color: var(--text-white); color: var(--text-white); }
        .btn-save {
            flex: 2;
            background: var(--imdb-gold);
            color: var(--imdb-black);
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-save:hover { background: #fbd54e; }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Table */
        .table-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--imdb-dark-gray);
            border-radius: 10px;
            overflow: hidden;
            font-size: 0.88rem;
        }
        thead { background: #1a1a1a; }
        th {
            padding: 12px 14px;
            text-align: left;
            color: var(--text-gray);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }
        td {
            padding: 12px 14px;
            border-top: 1px solid var(--border-gray);
            vertical-align: middle;
        }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .col-title { max-width: 200px; font-weight: 600; }
        .col-desc { max-width: 220px; color: var(--text-gray); font-size: 0.82rem;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-edit {
            background: rgba(87,153,239,0.15);
            color: var(--imdb-blue);
            border: 1px solid var(--imdb-blue);
            border-radius: 5px;
            padding: 5px 11px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 6px;
            transition: opacity 0.2s;
        }
        .btn-delete {
            background: rgba(224,82,82,0.15);
            color: #e05252;
            border: 1px solid #e05252;
            border-radius: 5px;
            padding: 5px 11px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-edit:hover, .btn-delete:hover { opacity: 0.75; }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        .alert-error   { background: rgba(224,82,82,0.15); border: 1px solid #e05252; color: #e05252; }
        .alert-success { background: rgba(76,175,80,0.15);  border: 1px solid #4caf50; color: #4caf50; }
        .loading { text-align: center; color: var(--text-gray); margin: 60px auto; }
        footer { text-align: center; color: var(--text-gray); font-size: 0.8rem; margin-top: 40px; }

        select option { background: #1a1a1a; }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="logo">IMDb</a>
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburger">
        <span></span><span></span><span></span>
    </label>
    <ul>
        <li><a href="index.html">Movie list</a></li>
        <li><a href="dashboard.html">My account</a></li>
        <li><a href="admin.html">Admin</a></li>
        <li><a href="movies.html" class="active">Manage movies</a></li>
    </ul>
</nav>

<p class="loading" id="loading">Verifying access…</p>

<div id="page-content" style="display:none;">
    <div class="page-header">
        <h1>Manage movies</h1>
        <button class="btn-primary" id="btn-add">+ Add movie</button>
    </div>

    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Director</th>
                    <th>Year</th>
                    <th>Duration</th>
                    <th>Rating</th>
                    <th>Genre</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="movies-tbody"></tbody>
        </table>
    </div>
</div>

<!-- Add / Edit modal -->
<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
        <h2 id="modal-title">Add movie</h2>
        <form id="movie-form" novalidate>
            <input type="hidden" id="movie-id">

            <div class="form-group" id="fg-title">
                <label for="f-title">Title *</label>
                <input type="text" id="f-title" maxlength="255" required>
                <div class="field-error" id="err-title"></div>
            </div>

            <div class="form-group" id="fg-director">
                <label for="f-director">Director</label>
                <input type="text" id="f-director" maxlength="255">
                <div class="field-error" id="err-director"></div>
            </div>

            <div class="form-row">
                <div class="form-group" id="fg-release_year">
                    <label for="f-year">Release year *</label>
                    <input type="number" id="f-year" min="1888" max="2035" required>
                    <div class="field-error" id="err-release_year"></div>
                </div>
                <div class="form-group" id="fg-duration_min">
                    <label for="f-duration">Duration (min) *</label>
                    <input type="number" id="f-duration" min="1" max="600" required>
                    <div class="field-error" id="err-duration_min"></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" id="fg-rating">
                    <label for="f-rating">Rating *</label>
                    <select id="f-rating" required>
                        <option value="">— select —</option>
                        <optgroup label="Film ratings">
                            <option>G</option>
                            <option>PG</option>
                            <option>PG-13</option>
                            <option>R</option>
                            <option>NC-17</option>
                            <option>NR</option>
                            <option>UR</option>
                        </optgroup>
                        <optgroup label="TV ratings">
                            <option>TV-Y</option>
                            <option>TV-Y7</option>
                            <option>TV-Y7-FV</option>
                            <option>TV-G</option>
                            <option>TV-PG</option>
                            <option>TV-14</option>
                            <option>TV-MA</option>
                        </optgroup>
                    </select>
                    <div class="field-error" id="err-rating"></div>
                </div>
                <div class="form-group" id="fg-genre">
                    <label for="f-genre">Genre *</label>
                    <input type="text" id="f-genre" maxlength="255" placeholder="e.g. Dramas, Thrillers" required>
                    <div class="field-error" id="err-genre"></div>
                </div>
            </div>

            <div class="form-group" id="fg-description">
                <label for="f-description">Description</label>
                <textarea id="f-description" maxlength="2000" rows="3"></textarea>
                <div class="field-error" id="err-description"></div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
                <button type="submit" class="btn-save" id="btn-save">Save movie</button>
            </div>
        </form>
    </div>
</div>

<footer><p>Copyright &copy; 2026 IMDb. All rights reserved.</p></footer>

<script>
const PHP_API = 'http://localhost:8080';

function showAlert(type, msg) {
    const el = document.getElementById(`alert-${type}`);
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3500);
}

function clearFormErrors() {
    document.querySelectorAll('.form-group').forEach(fg => fg.classList.remove('has-error'));
}

function showFormErrors(errors) {
    clearFormErrors();
    for (const [field, msg] of Object.entries(errors)) {
        const fg  = document.getElementById(`fg-${field}`);
        const err = document.getElementById(`err-${field}`);
        if (fg && err) {
            fg.classList.add('has-error');
            err.textContent = msg;
        }
    }
}

function openModal(movie = null) {
    clearFormErrors();
    document.getElementById('movie-form').reset();
    if (movie) {
        document.getElementById('modal-title').textContent = 'Edit movie';
        document.getElementById('movie-id').value          = movie.id;
        document.getElementById('f-title').value           = movie.title;
        document.getElementById('f-director').value        = movie.director;
        document.getElementById('f-year').value            = movie.release_year;
        document.getElementById('f-duration').value        = movie.duration_min;
        document.getElementById('f-rating').value          = movie.rating;
        document.getElementById('f-genre').value           = movie.genre;
        document.getElementById('f-description').value     = movie.description;
    } else {
        document.getElementById('modal-title').textContent = 'Add movie';
        document.getElementById('movie-id').value          = '';
    }
    document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
}

function buildRow(movie) {
    const tr = document.createElement('tr');
    tr.id = `row-${movie.id}`;
    tr.innerHTML = `
        <td>${movie.id}</td>
        <td class="col-title">${escHtml(movie.title)}</td>
        <td>${escHtml(movie.director || '—')}</td>
        <td>${movie.release_year}</td>
        <td>${movie.duration_min} min</td>
        <td>${escHtml(movie.rating)}</td>
        <td>${escHtml(movie.genre)}</td>
        <td class="col-desc" title="${escHtml(movie.description)}">${escHtml(movie.description)}</td>
        <td style="white-space:nowrap;">
            <button class="btn-edit"   onclick="editMovie(${movie.id})">Edit</button>
            <button class="btn-delete" onclick="deleteMovie(${movie.id}, '${escHtml(movie.title).replace(/'/g, "\\'")}')">Delete</button>
        </td>
    `;
    return tr;
}

function escHtml(str) {
    return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

let moviesCache = {};

async function loadMovies() {
    const res  = await fetch(`${PHP_API}/api/movies.php`, { credentials: 'include' });
    const data = await res.json();
    const tbody = document.getElementById('movies-tbody');
    tbody.innerHTML = '';
    moviesCache = {};
    data.movies.forEach(m => {
        moviesCache[m.id] = m;
        tbody.appendChild(buildRow(m));
    });
}

function editMovie(id) {
    openModal(moviesCache[id]);
}

async function deleteMovie(id, title) {
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    const res  = await fetch(`${PHP_API}/api/movies.php`, {
        method: 'DELETE',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
    });
    const data = await res.json();
    if (!res.ok) { showAlert('error', data.error); return; }
    delete moviesCache[id];
    document.getElementById(`row-${id}`)?.remove();
    showAlert('success', data.message);
}

document.getElementById('btn-add').addEventListener('click', () => openModal());
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

document.getElementById('movie-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFormErrors();

    const id = document.getElementById('movie-id').value;
    const payload = {
        title:        document.getElementById('f-title').value.trim(),
        director:     document.getElementById('f-director').value.trim(),
        release_year: document.getElementById('f-year').value,
        duration_min: document.getElementById('f-duration').value,
        rating:       document.getElementById('f-rating').value,
        genre:        document.getElementById('f-genre').value.trim(),
        description:  document.getElementById('f-description').value.trim(),
    };
    if (id) payload.id = parseInt(id);

    const saveBtn = document.getElementById('btn-save');
    saveBtn.disabled = true;

    const res  = await fetch(`${PHP_API}/api/movies.php`, {
        method: id ? 'PATCH' : 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
    });
    const data = await res.json();

    saveBtn.disabled = false;

    if (!res.ok) {
        if (data.errors) {
            showFormErrors(data.errors);
        } else {
            showAlert('error', data.error || 'Something went wrong.');
        }
        return;
    }

    moviesCache[data.movie.id] = data.movie;
    const existing = document.getElementById(`row-${data.movie.id}`);
    const newRow   = buildRow(data.movie);
    if (existing) {
        existing.replaceWith(newRow);
    } else {
        document.getElementById('movies-tbody').appendChild(newRow);
    }

    showAlert('success', id ? 'Movie updated.' : 'Movie added.');
    closeModal();
});

async function init() {
    try {
        const authRes = await fetch(`${PHP_API}/api/check_auth.php`, { credentials: 'include' });
        if (!authRes.ok) { window.location.href = 'login.html'; return; }
        const { user } = await authRes.json();
        if (user.role !== 'admin') { window.location.href = 'dashboard.html'; return; }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('page-content').style.display = 'block';
        await loadMovies();
    } catch (_) {
        window.location.href = 'login.html';
    }
}

init();
</script>
</body>
</html>
