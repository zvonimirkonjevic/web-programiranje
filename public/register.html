<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — IMDb</title>
    <link rel="stylesheet" href="style/style.css">
    <style>
        .auth-card {
            background: var(--imdb-dark-gray);
            border: 1px solid var(--border-gray);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            margin: auto;
        }
        .auth-card h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            text-align: left;
        }
        .auth-card .subtitle {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.88rem;
            color: var(--text-gray);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border-gray);
            border-radius: 6px;
            color: var(--text-white);
            padding: 10px 14px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--imdb-gold);
        }
        .hint {
            font-size: 0.78rem;
            color: var(--text-gray);
            margin-left: 4px;
        }
        .btn-submit {
            width: 100%;
            background: var(--imdb-gold);
            color: var(--imdb-black);
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #fbd54e; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .alert-error   { background: rgba(224,82,82,0.15); border: 1px solid #e05252; color: #e05252; }
        .alert-success { background: rgba(76,175,80,0.15);  border: 1px solid #4caf50; color: #4caf50; }
        .footer-link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.88rem;
            color: var(--text-gray);
        }
        .footer-link a { color: var(--imdb-gold); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
        footer {
            text-align: center;
            color: var(--text-gray);
            font-size: 0.8rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="logo">IMDb</a>
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburger">
        <span></span><span></span><span></span>
    </label>
    <ul>
        <li><a href="index.html">Movie list</a></li>
        <li><a href="/slike">Images page</a></li>
        <li><a href="grafikon.html">Statistics page</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html" class="active">Register</a></li>
    </ul>
</nav>

<div class="auth-card">
    <h1>Create account</h1>
    <p class="subtitle">Join IMDb to track your watchlist and more.</p>

    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <form id="register-form" novalidate>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
                   maxlength="50" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email"
                   maxlength="255" autocomplete="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password <span class="hint">(min. 8 characters)</span></label>
            <input type="password" id="password" name="password"
                   minlength="8" autocomplete="new-password" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   minlength="8" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Create account</button>
    </form>

    <p class="footer-link">Already have an account? <a href="login.html">Sign in</a></p>
</div>

<footer><p>Copyright &copy; 2026 IMDb. All rights reserved.</p></footer>

<script>
    const PHP_API = 'http://localhost:8080';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const errorEl = document.getElementById('alert-error');
        const successEl = document.getElementById('alert-success');
        const submitBtn = document.getElementById('submit-btn');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account…';

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;

        if (password !== confirm_password) {
            errorEl.textContent = 'Passwords do not match.';
            errorEl.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create account';
            return;
        }

        try {
            const res = await fetch(`${PHP_API}/api/register.php`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, confirm_password }),
            });

            const data = await res.json();

            if (!res.ok) {
                errorEl.textContent = data.error || 'Registration failed.';
                errorEl.style.display = 'block';
            } else {
                successEl.innerHTML = 'Account created! <a href="login.html" style="color:inherit;font-weight:700;">Sign in now &rarr;</a>';
                successEl.style.display = 'block';
                document.getElementById('register-form').reset();
            }
        } catch (err) {
            errorEl.textContent = 'Could not connect to the server. Is the PHP server running?';
            errorEl.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create account';
        }
    });
</script>
</body>
</html>
